<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robot" content="noindex, nofollow" />
    <link rel="stylesheet" href="globle.css" />
    <link rel="stylesheet" href="forms_style.css" />
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet" />

    <title>Document</title>
  </head>
  <body>
    <header class="topbar">
      <div class="burger">
        <i class="fa fa-bars"></i>
      </div>

      <div class="logo">
        <img src="logolightmode.png" alt="Electro Logo" />
      </div>

      <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" placeholder="Find produkt" />
        <button>Søg</button>
      </div>

      <nav class="menu-icons">
        <a href="#">
          <img src="ikoner/Shopping-Cart-Add--Streamline-Core.svg" alt="Indkøbskurv" />
          Indkøbskurv
        </a>

        <a href="#">
          <img src="ikoner/Single-Neutral-Circle--Streamline-Ultimate.svg" alt="Login" />
          Login
        </a>

        <a href="#">
          <span class="moon-icon">🌙</span>
          Darkmode
        </a>
      </nav>
    </header>

    <div class="burger-menu">
      <div class="burger-top">
        <img src="logolightmode.png" alt="Electro Logo" class="burger-logo" />
      </div>

      <div class="burger-search">
        <i class="fa fa-search"></i>
        <span>Søg</span>
      </div>

      <div class="burger-categories">
        <a href="#" class="burger-category">
          <span>LAPTOPS AND TABLETS</span>
          <div class="burger-icons">
            <img src="ikoner/Categories/Laptop--Streamline-Ultimate.svg" alt="Laptop" />
            <img src="ikoner/Categories/Tablet--Streamline-Ultimate.svg" alt="Tablet" />
          </div>
          <div class="burger-arrow">
            <i class="fa fa-arrow-right"></i>
          </div>
        </a>

        <a href="#" class="burger-category">
          <span>SMARTPHONES</span>
          <div class="burger-icons">
            <img src="ikoner/Categories/Phone-Type--Streamline-Ultimate.svg" alt="Smartphone" />
          </div>
          <div class="burger-arrow">
            <i class="fa fa-arrow-right"></i>
          </div>
        </a>

        <a href="#" class="burger-category">
          <span>SMARTWATCHES</span>
          <div class="burger-icons">
            <img src="ikoner/Categories/Smart-Watch-Square-Power--Streamline-Ultimate.svg" alt="Smartwatch" />
          </div>
          <div class="burger-arrow">
            <i class="fa fa-arrow-right"></i>
          </div>
        </a>

        <a href="#" class="burger-category">
          <span>Din nærmeste ElectroHub</span>
          <div class="burger-icons">
            <img src="ikoner/location.svg" alt="Lokation" />
          </div>
          <div class="burger-arrow">
            <i class="fa fa-arrow-right"></i>
          </div>
        </a>
      </div>

      <div class="burger-bottom">
        <a href="#" class="burger-account">
          <img src="ikoner/Single-Neutral-Circle--Streamline-Ultimate.svg" alt="Login" />
          <span>Login</span>
        </a>

        <a href="#" class="burger-account">
          <img src="ikoner/signup.svg" alt="Signup" />
          <span>Signup</span>
        </a>
      </div>
    </div>
    <main>
      <div class="form-wrapper">
        <div class="overskrift"><h1>OPRET BRUGER</h1></div>

        <section class="opret_bruger">
          <div class="forms">
            <label for="fname">FORNAVN:</label>
            <input type="text" id="fname" name="fname" placeholder="NIELS" />
          </div>

          <div class="forms">
            <label for="lname">EFTERNAVN:</label>
            <input type="text" id="lname" name="lname" placeholder="NIELSEN" />
          </div>

          <div class="forms">
            <label for="mobile">MOBILNUMMER:</label>
            <input type="tel" id="mobile" name="mobile" placeholder="12 34 56 78" />
          </div>

          <div class="forms">
            <label for="email">E-MAIL:</label>
            <input type="email" id="email" name="email" placeholder="NIELSNIELSEN@NILLERMAIL.DK" />
          </div>

          <div class="forms">
            <label for="password">PASSWORD</label>
            <input type="password" id="password" name="password" placeholder="********************" />
          </div>

          <div class="forms">
            <label for="repeat-password">GENTAG PASSWORD:</label>
            <input type="password" id="repeat-password" name="repeat-password" placeholder="********************" />
          </div>
        </section>

        <button class="mybutton">Opret bruger</button>
      </div>
    </main>
  </body>
  <script src="forms.js"></script>
</html>
