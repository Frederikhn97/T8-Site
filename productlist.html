<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="productlist.css">
    <link rel="stylesheet" href="global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Audiowide&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap"
        rel="stylesheet" />











    <title>Document</title>
</head>

<body>
    <header class="topbar">
        <div class="burger">
            <i class="fa fa-bars"></i>
        </div>

        <div class="logo">
            <a href="index.html"><img src="logolightmode.png" alt="Electro Logo"></a>
        </div>

        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" placeholder="Find produkt">
            <button>Søg</button>
        </div>

        <nav class="menu-icons">
            <a href="#">
                <img src="ikoner/Shopping-Cart-Add--Streamline-Core.svg" alt="Indkøbskurv">
                Indkøbskurv
            </a>

            <a href="forms.html">
                <img src="ikoner/Single-Neutral-Circle--Streamline-Ultimate.svg" alt="Login">
                Login
            </a>

            <a href="#" id="darkmode-toggle">
                <span class="moon-icon">🌙</span>
                Darkmode
            </a>
        </nav>
    </header>

    <div class="burger-menu">
        <div class="burger-top">
            <img src="logolightmode.png" alt="Electro Logo" class="burger-logo">
        </div>

        <div class="burger-search">
            <i class="fa fa-search"></i>
            <span>Søg</span>
        </div>

        <div class="burger-categories">
            <a href="#" class="burger-category">
                <span>LAPTOPS AND TABLETS</span>
                <div class="burger-icons">
                    <img src="ikoner/Categories/Laptop--Streamline-Ultimate.svg" alt="Laptop">
                    <img src="ikoner/Categories/Tablet--Streamline-Ultimate.svg" alt="Tablet">
                </div>
                <div class="burger-arrow">
                    <i class="fa fa-arrow-right"></i>
                </div>
            </a>

            <a href="#" class="burger-category">
                <span>SMARTPHONES</span>
                <div class="burger-icons">
                    <img src="ikoner/Categories/Phone-Type--Streamline-Ultimate.svg" alt="Smartphone">
                </div>
                <div class="burger-arrow">
                    <i class="fa fa-arrow-right"></i>
                </div>
            </a>

            <a href="#" class="burger-category">
                <span>SMARTWATCHES</span>
                <div class="burger-icons">
                    <img src="ikoner/Categories/Smart-Watch-Square-Power--Streamline-Ultimate.svg" alt="Smartwatch">
                </div>
                <div class="burger-arrow">
                    <i class="fa fa-arrow-right"></i>
                </div>
            </a>

            <a href="#" class="burger-category">
                <span>Din nærmeste ElectroHub</span>
                <div class="burger-icons">
                    <img src="ikoner/location.svg" alt="Lokation">
                </div>
                <div class="burger-arrow">
                    <i class="fa fa-arrow-right"></i>
                </div>
            </a>
        </div>

        <div class="burger-bottom">
            <a href="#" class="burger-account">
                <img src="ikoner/Single-Neutral-Circle--Streamline-Ultimate.svg" alt="Login">
                <span>Login</span>
            </a>

            <a href="#" class="burger-account">
                <img src="ikoner/signup.svg" alt="Signup">
                <span>Signup</span>
            </a>
        </div>
    </div>
    <main>
        <div class="container">
            <h1 class="tekst"></h1>
            <h2 class="stortudvalg"></h2>
            <div class="products"></div>
        </div>
    </main>
    <script src="productlist.js"></script>
    <script src="darkmode.js"></script>
    <button popovertarget="popup">
        <footer class="customerrelations">Vil du spare 10% ?</footer>
    </button>
    <div id="news_popover">
        <div popover id="popup">
            <button popovertarget="popup" class="luk-btn">Luk</button>
            <div class="tilmed">
                <h2>Kunne du tænke dig at spare 10 % ?</h2>
            </div>
            <p class="nyhedsbrevet">Tilmeld dig nyhedsbrevet her og få 10 % på dit første køb</p>
            <input type="email" placeholder="Indtast email" class="email">
            <button class="continue">Fortsæt</button>

        </div>
    </div>
</body>

</html>
