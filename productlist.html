<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="productlist.css">
    <link rel="stylesheet" href="global.css">

    <title>Document</title>
</head>

<body>
    <header class="topbar">
        <div class="burger">
            <i class="fa fa-bars"></i>
        </div>

        <div class="logo">
            <img src="logolightmode.png" alt="Electro Logo">
        </div>

        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" placeholder="Find produkt">
            <button>Søg</button>
        </div>

        <nav class="menu-icons">
            <a href="#">
                <img src="ikoner/Shopping-Cart-Add--Streamline-Core.svg" alt="Indkøbskurv">
                Indkøbskurv
            </a>

            <a href="#">
                <img src="ikoner/Single-Neutral-Circle--Streamline-Ultimate.svg" alt="Login">
                Login
            </a>

            <a href="#" id="darkmode-toggle">
                <span class="moon-icon">🌙</span>
                Darkmode
            </a>
        </nav>
    </header>
    <main class="catalog">
        <h1 class="page-title"></h1>
        <p class="page-subtitle">
            Stort udvalg af laptops og tablets fra alle de største brands.
        </p>

        <section class="productlist"></section>
    </main>
    <script src="productlist.js"></script>
    <script src="darkmode.js"></script>

</body>

</html>
